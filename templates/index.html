<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dynamic Proposal Generator</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="card shadow-lg border-0">

            <div class="card-body p-5">

                <h1 class="text-center mb-5">
                    Dynamic Proposal Generator
                </h1>

                <!-- Form -->
                <form method="POST">

                    <!-- Project Title -->
                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Project Title
                        </label>

                        <input
                            type="text"
                            name="project_title"
                            class="form-control"
                            placeholder="Enter Project Title"
                            required
                        >

                    </div>

                    <!-- Project Budget -->
                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Project Budget
                        </label>

                        <input
                            type="text"
                            name="project_budget"
                            class="form-control"
                            placeholder="$1500"
                            required
                        >

                    </div>

                    <!-- Project Timeline -->
                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Project Timeline
                        </label>

                        <input
                            type="text"
                            name="project_timeline"
                            class="form-control"
                            placeholder="15 Days"
                            required
                        >

                    </div>

                    <!-- Past Work -->
                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            Past Work URLs
                        </label>

                        <textarea
                            name="past_work"
                            rows="5"
                            class="form-control"
                            placeholder="One URL per line"
                            required
                        ></textarea>

                    </div>

                    <!-- Generate Button -->
                    <div class="text-center">

                        <button
                            type="submit"
                            class="btn btn-primary px-5 py-2"
                        >
                            Generate Proposal
                        </button>

                    </div>

                </form>

                <!-- Proposal Output -->
                {% if proposal %}

                <div class="mt-5">

                    <h3 class="mb-3">
                        Generated Proposal
                    </h3>

                    <div class="bg-light border rounded p-4">

                        <pre style="white-space: pre-wrap;">{{ proposal }}</pre>

                    </div>

                    <!-- Download PDF Button -->
                    <div class="mt-4 text-center">

                        <a
                            href="/download-pdf"
                            class="btn btn-success px-5 py-2"
                        >
                            Download PDF
                        </a>

                    </div>

                </div>

                {% endif %}

            </div>

        </div>

    </div>

</body>

</html>
